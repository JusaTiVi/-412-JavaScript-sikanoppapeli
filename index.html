<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sika-noppapeli</title>
</head>
<body>
    <div id="valmistelu">
        <p>montako pelaajaa?</p>
        <input id="maara" type="number">
        <button onclick="pelaajamaara()">vahvista</button>

        <div id="nimiosa" style="display: none;">

            <p>anna pelaajien nimet</p>

            <input id="pelaajanimet">
            <button onclick="pelaajat()">lisää</button>

            <ul id="pelaajat"></ul>

            <button onclick="aloita()">aloita peli</button>
        </div>
    </div>
    
    <div id="game" style="display: none;">
        <h2>peli käynnissä</h2>

        <button onclick="heitto()">Heitä noppaa</button>

        <p id="tulos"></p>
    </div>

</body>

<script src="js/main.js"></script>
</html>
